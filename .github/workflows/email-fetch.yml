name: Fetch Gmail Emails

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # Manuell auslösbar im GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call email-fetch API
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/email-fetch" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
